<VirtualHost *:8000>
    ServerName localhost
    DocumentRoot /home/ubuntu/repos/ppsr/php-backend/public
    
    <Directory /home/ubuntu/repos/ppsr/php-backend/public>
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
